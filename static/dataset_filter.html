<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGC 数据集筛选器</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --text2: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d2991d;
  --orange: #db6d28;
  --purple: #a371f7;
  --font: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font: 14px var(--font); min-height: 100vh; }

.header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 12px;
}
.header h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
.header .badge { font-size: 11px; background: var(--bg3); padding: 3px 8px; border-radius: 4px; color: var(--text2); }

.main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

/* 面板 */
.panel {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  padding: 18px 20px; margin-bottom: 16px;
}
.panel-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

/* 表单 */
.form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
.form-group label { font-size: 12px; color: var(--text2); }
.form-group input, .form-group select {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 8px 10px; border-radius: 6px; font: 14px var(--font-mono); outline: none;
}
.form-group input:focus { border-color: var(--accent); }
.form-group .hint { font-size: 11px; color: var(--text2); }

.btn {
  padding: 8px 18px; border-radius: 6px; border: 1px solid var(--border);
  font: 13px var(--font); cursor: pointer; transition: .15s;
  background: var(--bg3); color: var(--text);
}
.btn:hover { border-color: var(--accent); }
.btn-primary { background: #238636; border-color: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-danger { background: #da3633; border-color: #da3633; color: #fff; }
.btn-danger:hover { background: #f85149; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 滑块 */
.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.slider-row label { font-size: 12px; color: var(--text2); min-width: 70px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--accent); }
.slider-row .val { font: 13px var(--font-mono); color: var(--accent); min-width: 36px; text-align: right; }

/* 构图比例 */
.comp-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
.comp-item { display: flex; align-items: center; gap: 4px; background: var(--bg3); padding: 4px 10px; border-radius: 4px; font-size: 12px; }
.comp-item input { width: 48px; background: transparent; border: none; color: var(--accent); font: 13px var(--font-mono); text-align: center; }
.comp-item .perc { color: var(--text2); }

/* 进度 */
.progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin: 8px 0; }
.progress-bar .fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
.stage-list { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; margin-top: 6px; }
.stage-item { padding: 4px 10px; border-radius: 4px; background: var(--bg3); color: var(--text2); }
.stage-item.done { background: #1a3a1a; color: var(--green); }
.stage-item.active { background: #1a2a3a; color: var(--accent); }
.stage-item.error { background: #3a1a1a; color: var(--red); }

/* 统计卡片 */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 10px; margin-top: 10px; }
.stat-card { background: var(--bg3); padding: 12px 14px; border-radius: 6px; text-align: center; }
.stat-card .num { font: 28px var(--font-mono); font-weight: 600; }
.stat-card .label { font-size: 11px; color: var(--text2); margin-top: 2px; }
.stat-card.total .num { color: var(--accent); }
.stat-card.reject .num { color: var(--red); }
.stat-card.dup .num { color: var(--orange); }
.stat-card.balance .num { color: var(--yellow); }
.stat-card.selected .num { color: var(--green); }

/* 表格 */
.table-wrap { max-height: 400px; overflow-y: auto; margin-top: 10px; border: 1px solid var(--border); border-radius: 6px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--bg3); padding: 8px 10px; text-align: left; font-weight: 600; color: var(--text2); position: sticky; top: 0; }
td { padding: 6px 10px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; }
tr:hover { background: var(--bg3); }
.tag { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; }
.tag-ok { background: #1a3a1a; color: var(--green); }
.tag-dup { background: #3a2a1a; color: var(--orange); }
.tag-rej { background: #3a1a1a; color: var(--red); }
.tag-bal { background: #3a3a1a; color: var(--yellow); }

/* 开关 */
.toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; }
.toggle input { display: none; }
.toggle .knob { width: 36px; height: 20px; background: var(--bg3); border-radius: 10px; position: relative; transition: .2s; border: 1px solid var(--border); }
.toggle .knob::after { content: ''; width: 14px; height: 14px; background: var(--text2); border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: .2s; }
.toggle input:checked + .knob { background: #1a3a2a; border-color: var(--green); }
.toggle input:checked + .knob::after { left: 18px; background: var(--green); }

.error-msg { background: #3a1a1a; border: 1px solid var(--red); color: var(--red); padding: 10px 14px; border-radius: 6px; font-size: 12px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>&#x1F9F9; 数据集筛选器</h1>
  <span class="badge">V1.1 · 端口 8888</span>
  <span style="flex:1"></span>
  <span class="badge" id="svcStatus">● 就绪</span>
</div>

<div class="main">

  <!-- 输入设置 -->
  <div class="panel">
    <div class="panel-title">&#x1F4C1; 输入设置</div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>素材目录</label>
        <input type="text" id="inputDir" placeholder="output/character/_flat_玄幻修仙">
        <span class="hint">包含待筛选图片的目录路径</span>
      </div>
      <div class="form-group" style="flex:2">
        <label>输出目录</label>
        <input type="text" id="outputDir" placeholder="留空则自动生成 training_dataset/日期时间">
        <span class="hint">筛选结果将保存到此目录</span>
      </div>
      <button class="btn" id="btnBrowseInput" style="align-self:flex-end">&#x1F50D; 浏览</button>
    </div>
  </div>

  <!-- 筛选参数 -->
  <div class="panel">
    <div class="panel-title">&#x2699; 筛选参数</div>
    <div class="slider-row">
      <label>质量阈值</label>
      <input type="range" id="qualityThreshold" min="0" max="1" step="0.01" value="0.15">
      <span class="val" id="qualityVal">0.15</span>
      <span style="font-size:11px;color:var(--text2)">低=保留多,高=严格</span>
    </div>
    <div class="slider-row">
      <label>去重敏感度</label>
      <input type="range" id="hammingThreshold" min="0" max="20" step="1" value="5">
      <span class="val" id="hammingVal">5</span>
      <span style="font-size:11px;color:var(--text2)">小=严格,大=宽松</span>
    </div>
    <label class="toggle" id="toggleBalance" style="margin-top:8px">
      <input type="checkbox" id="enableBalance" checked>
      <span class="knob"></span>
      启用构图均衡
    </label>
    <div id="compTargets" style="margin-top:6px">
      <div class="comp-row">
        <div class="comp-item">全身 <input type="number" id="comp_full" value="45" min="0" max="100" step="1"><span class="perc">%</span></div>
        <div class="comp-item">半身 <input type="number" id="comp_half" value="25" min="0" max="100" step="1"><span class="perc">%</span></div>
        <div class="comp-item">胸像 <input type="number" id="comp_bust" value="15" min="0" max="100" step="1"><span class="perc">%</span></div>
        <div class="comp-item">特写 <input type="number" id="comp_closeup" value="10" min="0" max="100" step="1"><span class="perc">%</span></div>
        <div class="comp-item">环境人像 <input type="number" id="comp_env" value="5" min="0" max="100" step="1"><span class="perc">%</span></div>
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div style="display:flex;gap:10px;margin-bottom:16px">
    <button class="btn btn-primary" id="btnStart" style="font-size:15px;padding:10px 28px">&#x25B6; 开始筛选</button>
    <button class="btn btn-danger" id="btnCancel" disabled>&#x25A0; 取消</button>
    <button class="btn" id="btnReset">&#x21BA; 重置参数</button>
  </div>

  <!-- 进度 -->
  <div class="panel" id="progressPanel" style="display:none">
    <div class="panel-title">&#x23F3; 进度</div>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <div style="font:13px var(--font-mono);margin-top:4px" id="progressText">等待中…</div>
    <div class="stage-list" id="stageList"></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- 结果 -->
  <div class="panel" id="resultPanel" style="display:none">
    <div class="panel-title">&#x1F4CA; 筛选结果</div>
    <div class="stat-grid" id="statGrid"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn" id="btnTabAll">&#x1F4C4; 全部</button>
      <button class="btn" id="btnTabSelected">&#x2705; 保留</button>
      <button class="btn" id="btnTabRejected">&#x274C; 剔除</button>
      <button class="btn" id="btnTabDup">&#x1F4CE; 重复</button>
      <button class="btn" id="btnTabBal">&#x2696; 构图挤出</button>
      <span style="flex:1"></span>
      <button class="btn" id="btnOpenDir">&#x1F4C2; 打开输出目录</button>
      <button class="btn" id="btnDownloadReport">&#x1F4E5; 下载报告</button>
    </div>
    <div class="table-wrap" id="tableWrap" style="margin-top:8px">
      <table>
        <thead><tr>
          <th>文件名</th><th>质量分</th><th>构图</th><th>来源</th><th>状态</th><th>原因</th>
        </tr></thead>
        <tbody id="resultTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="/static/dataset_filter.js"></script>
</body>
</html>
